<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N-DAMS | Unified Command</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: radial-gradient(circle at center, #1B2735 0%, #090A0F 100%); overflow-x: hidden; }
        .stars-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        @keyframes drift { from { transform: translateY(0px); } to { transform: translateY(-2000px); } }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.5; animation: drift linear infinite; }
        
        .glass-sidebar { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(15px); border-right: 1px solid rgba(255, 255, 255, 0.08); }
        .module-btn { background: rgba(70, 131, 180, 0.2); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .module-btn:hover { transform: scale(1.08); border-color: rgba(255, 255, 255, 0.4); }
        
        .glow-blue:hover { box-shadow: 0 0 20px rgba(59, 130, 246, 0.5); }
        .glow-purple:hover { box-shadow: 0 0 20px rgba(168, 85, 247, 0.5); }
        .glow-cyan:hover { box-shadow: 0 0 20px rgba(6, 182, 212, 0.5); }
        .glow-emerald:hover { box-shadow: 0 0 20px rgba(16, 185, 129, 0.5); }

        /* Light Theme Overlay for Management */
        .management-view { display: none; background: #f8fafc; color: #1e293b; min-height: 100vh; position: absolute; top: 0; left: 0; width: 100%; z-index: 50; }
        .glass-panel { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body class="flex min-h-screen text-slate-200">

    <div class="stars-container" id="starField"></div>

    <div id="hubView" class="flex w-full">
        <aside class="w-64 glass-sidebar h-screen sticky top-0 p-6 hidden md:block">
            <div class="mb-10">
                <h2 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500">N-DAMS</h2>
                <p class="text-[10px] text-slate-500 uppercase tracking-[0.3em] font-bold">Admin Access</p>
            </div>
            <nav class="space-y-3">
                <a href="#" class="flex items-center space-x-3 p-3 bg-indigo-600/20 border border-indigo-500/30 text-indigo-300 rounded-xl">
                    <i class="fa-solid fa-rocket"></i><span class="text-sm">Management Hub</span>
                </a>
                <button onclick="localStorage.clear(); location.reload();" class="text-[10px] text-rose-400/50 hover:text-rose-400 mt-20 block uppercase tracking-widest font-bold">Wipe System Data</button>
            </nav>
        </aside>

        <main class="flex-1 p-8">
            <header class="flex justify-between items-center mb-10">
                <div>
                    <h1 class="text-3xl font-bold text-white tracking-tight">Admin Control Center</h1>
                    <p class="text-slate-400">Data is a blur until you have the right optics.</p>
                </div>
                <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center text-white font-bold border border-white/20">AD</div>
            </header>

            <section>
                <div class="flex items-center space-x-4 mb-8">
                    <div class="h-px w-full bg-gradient-to-r from-indigo-500/50 to-transparent"></div>
                    <h2 class="text-sm font-black uppercase tracking-[0.4em] text-indigo-400 whitespace-nowrap">Quick Module Access</h2>
                    <div class="h-px w-full bg-gradient-to-r from-indigo-500/50 to-transparent"></div>
                </div>
                <div class="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-6 xl:grid-cols-8 gap-5" id="moduleGrid"></div>
            </section>
        </main>
    </div>

    <div id="mgmtView" class="management-view p-4 md:p-8">
        <header class="flex justify-between items-center mb-8 max-w-7xl mx-auto">
            <div class="flex items-center space-x-4">
                <button onclick="closeManagement()" class="glass-panel p-3 rounded-xl text-indigo-600 hover:bg-white transition shadow-sm">
                    <i class="fa-solid fa-arrow-left"></i>
                </button>
                <div>
                    <h1 id="activeModTitle" class="text-2xl font-bold uppercase text-slate-900 tracking-tight">MODULE</h1>
                    <p class="text-[10px] text-slate-500 uppercase tracking-[0.3em]">Stream purification active.</p>
                </div>
            </div>
            <button onclick="openModal()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg text-xs font-bold shadow-lg transition-all">
                + Add New Record
            </button>
        </header>

        <div class="glass-panel rounded-3xl overflow-hidden shadow-xl max-w-7xl mx-auto border border-black/5">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-indigo-50/50 text-indigo-700 uppercase text-[10px] font-black tracking-widest">
                        <th class="p-4 border-b">Sr.</th>
                        <th class="p-4 border-b">Zone</th>
                        <th class="p-4 border-b">Node Name</th>
                        <th class="p-4 border-b">Profile</th>
                        <th class="p-4 border-b text-center">Actions</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="text-[11px] font-medium text-slate-600 divide-y divide-black/5"></tbody>
            </table>
        </div>
    </div>

    <div id="entryModal" class="hidden fixed inset-0 z-[100] bg-slate-900/60 backdrop-blur-sm items-center justify-center p-4">
        <div class="bg-white rounded-3xl shadow-2xl max-w-md w-full p-8">
            <h3 class="text-xl font-bold text-slate-900 mb-6">New Data Entry</h3>
            <div class="space-y-4">
                <input id="inZone" type="text" placeholder="Zone (e.g. CR)" class="w-full border border-slate-200 rounded-xl p-3 text-sm focus:ring-2 ring-indigo-500 outline-none">
                <input id="inNode" type="text" placeholder="Node Name" class="w-full border border-slate-200 rounded-xl p-3 text-sm focus:ring-2 ring-indigo-500 outline-none">
                <input id="inProfile" type="text" placeholder="Profile Details" class="w-full border border-slate-200 rounded-xl p-3 text-sm focus:ring-2 ring-indigo-500 outline-none">
                <div class="flex space-x-3 pt-4">
                    <button onclick="closeModal()" class="flex-1 py-3 text-xs font-bold uppercase text-slate-400">Cancel</button>
                    <button onclick="saveData()" class="flex-1 py-3 bg-indigo-600 text-white rounded-xl text-xs font-bold uppercase">Save</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. STARFIELD ENGINE
        const starField = document.getElementById('starField');
        for (let i = 0; i < 150; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 2 + 1 + 'px';
            star.style.width = size; star.style.height = size;
            star.style.left = Math.random() * 100 + '%'; star.style.top = Math.random() * 100 + '%';
            star.style.animationDuration = (Math.random() * 50 + 50) + 's';
            starField.appendChild(star);
        }

        // 2. GALAXY HUB ENGINE
        const modules = [
            'FOIS', 'EARTH', 'FC', 'TCS', 'UTS', 'PRS', 'COIS', 'ICMS', 'CMS', 'RMS',
            'SATS', 'BMS', 'LMS', 'VMS', 'NMS', 'TMS', 'ZMS', 'GMS', 'FMS', 'WMS',
            'A-1', 'B-2', 'C-3', 'ALPHA', 'BETA', 'GAMMA', 'DELTA', 'SIGMA', 'OMEGA', 'ZETA',
            'CORE', 'NODE', 'LINK', 'SITE', 'PORT', 'HUB', 'GRID', 'FLOW', 'BASE', 'APEX'
        ];

        const grid = document.getElementById('moduleGrid');
        let currentActiveModule = '';

        modules.forEach((mod) => {
            const themes = [
                {c: 'text-blue-400', g: 'glow-blue'}, {c: 'text-purple-400', g: 'glow-purple'},
                {c: 'text-cyan-400', g: 'glow-cyan'}, {c: 'text-emerald-400', g: 'glow-emerald'}
            ];
            const theme = themes[Math.floor(Math.random() * themes.length)];
            const btn = document.createElement('button');
            btn.className = `module-btn py-6 px-4 rounded-2xl flex flex-col items-center justify-center space-y-3 group ${theme.g}`;
            btn.innerHTML = `<i class="fa-solid fa-atom ${theme.c} text-2xl group-hover:rotate-180 transition-all duration-700"></i>
                             <span class="text-[11px] font-black tracking-widest text-white uppercase">${mod}</span>`;
            btn.onclick = () => openManagement(mod);
            grid.appendChild(btn);
        });

        // 3. DATA MANAGEMENT ENGINE
        function openManagement(modName) {
            currentActiveModule = modName;
            document.getElementById('activeModTitle').innerText = modName;
            document.getElementById('hubView').style.display = 'none';
            document.getElementById('mgmtView').style.display = 'block';
            renderTable();
        }

        function closeManagement() {
            document.getElementById('hubView').style.display = 'flex';
            document.getElementById('mgmtView').style.display = 'none';
        }

        function renderTable() {
            const tableBody = document.getElementById('tableBody');
            const data = JSON.parse(localStorage.getItem(`ndams_${currentActiveModule}`)) || [];
            
            if(data.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="5" class="p-10 text-center text-slate-400 italic">No records in ${currentActiveModule} stream.</td></tr>`;
                return;
            }

            tableBody.innerHTML = data.map((item, index) => `
                <tr class="hover:bg-indigo-50/50 transition">
                    <td class="p-4 font-mono text-slate-300">${index + 1}</td>
                    <td class="p-4 font-bold text-slate-800">${item.zone}</td>
                    <td class="p-4 font-black text-indigo-900">${item.node}</td>
                    <td class="p-4 text-slate-500">${item.profile}</td>
                    <td class="p-4 text-center">
                        <button onclick="deleteRow(${index})" class="text-rose-400 hover:text-rose-600 p-2"><i class="fa-solid fa-trash-can"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        // 4. MODAL & STORAGE LOGIC
        const modal = document.getElementById('entryModal');
        function openModal() { modal.classList.replace('hidden', 'flex'); }
        function closeModal() { modal.classList.replace('flex', 'hidden'); }

        function saveData() {
            const zone = document.getElementById('inZone').value;
            const node = document.getElementById('inNode').value;
            const profile = document.getElementById('inProfile').value;

            if(!zone || !node) return alert("Zone and Node Name are required.");

            const storageKey = `ndams_${currentActiveModule}`;
            const data = JSON.parse(localStorage.getItem(storageKey)) || [];
            data.push({ zone, node, profile });
            localStorage.setItem(storageKey, JSON.stringify(data));

            document.querySelectorAll('#entryModal input').forEach(i => i.value = '');
            closeModal();
            renderTable();
        }

        function deleteRow(index) {
            if(confirm("Purge this record from the stream?")) {
                const storageKey = `ndams_${currentActiveModule}`;
                const data = JSON.parse(localStorage.getItem(storageKey));
                data.splice(index, 1);
                localStorage.setItem(storageKey, JSON.stringify(data));
                renderTable();
            }
        }
    </script>
</body>
</html>
