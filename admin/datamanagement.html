<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N-DAMS | Galaxy Command</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: radial-gradient(circle at center, #1B2735 0%, #090A0F 100%); overflow: hidden; }
        .stars-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.5; animation: drift linear infinite; }
        @keyframes drift { from { transform: translateY(0px); } to { transform: translateY(-2000px); } }
        .glass-sidebar { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(15px); border-right: 1px solid rgba(255, 255, 255, 0.08); }
        .module-btn { background: rgba(70, 131, 180, 0.1); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .module-btn:hover { transform: scale(1.1); border-color: rgba(255, 255, 255, 0.4); box-shadow: 0 0 25px rgba(59, 130, 246, 0.5); }
        .glow-blue:hover { background: rgba(59, 130, 246, 0.2); }
    </style>
</head>
<body class="flex min-h-screen text-slate-200">
    <div class="stars-container" id="starField"></div>

    <aside class="w-64 glass-sidebar h-screen sticky top-0 p-6 hidden md:block">
        <div class="mb-10">
            <h2 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500">N-DAMS</h2>
            <p class="text-[10px] text-slate-500 uppercase tracking-[0.3em] font-bold">Admin Hub</p>
        </div>
        <nav class="space-y-3">
            <a href="#" class="flex items-center space-x-3 p-3 bg-indigo-600/20 border border-indigo-500/30 text-indigo-300 rounded-xl"><i class="fa-solid fa-rocket"></i><span>Dashboard</span></a>
            <button onclick="addNewModule()" class="flex items-center space-x-3 p-3 text-emerald-400 hover:bg-emerald-900/20 w-full rounded-lg transition border border-emerald-500/20 mt-4">
                <i class="fa-solid fa-plus-circle"></i><span>Add New Module</span>
            </button>
        </nav>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto h-screen">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-bold text-white tracking-tight">Galaxy Command Center</h1>
                <p class="text-slate-400">Deploying modules to the <span class="text-blue-400">Railway Grid.</span></p>
            </div>
            <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center text-white font-bold border border-white/20">AD</div>
        </header>

        <div class="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-6 xl:grid-cols-8 gap-5" id="moduleGrid">
            </div>
    </main>

    <script>
        // Generate Stars
        const starField = document.getElementById('starField');
        for (let i = 0; i < 150; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 2 + 1 + 'px';
            star.style.width = size; star.style.height = size;
            star.style.left = Math.random() * 100 + '%'; star.style.top = Math.random() * 100 + '%';
            star.style.animationDuration = (Math.random() * 50 + 50) + 's';
            starField.appendChild(star);
        }

        // Module Management
        let modules = ['FOIS', 'EARTH', 'UTS', 'PRS', 'CMS', 'COIS'];

        function renderModules() {
            const grid = document.getElementById('moduleGrid');
            grid.innerHTML = '';
            modules.forEach(mod => {
                const btn = document.createElement('button');
                btn.className = `module-btn py-8 px-4 rounded-2xl flex flex-col items-center justify-center space-y-3 group glow-blue`;
                btn.onclick = () => window.location.href = `data-view.html?mod=${mod}`;
                btn.innerHTML = `
                    <i class="fa-solid fa-atom text-blue-400 text-2xl group-hover:rotate-180 transition-transform duration-700"></i>
                    <span class="text-xs font-black tracking-widest text-white uppercase">${mod}</span>
                `;
                grid.appendChild(btn);
            });
        }

        function addNewModule() {
            const name = prompt("Enter Module Name (e.g., SIGMA):");
            if (name) {
                modules.push(name.toUpperCase());
                renderModules();
            }
        }

        renderModules();
    </script>
</body>
</html>
