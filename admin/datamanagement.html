<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N-DAMS | Galaxy Command</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: radial-gradient(circle at center, #1B2735 0%, #090A0F 100%); overflow-x: hidden; }
        .stars-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.5; animation: drift linear infinite; }
        @keyframes drift { from { transform: translateY(0px); } to { transform: translateY(-2000px); } }
        .glass-sidebar { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(15px); border-right: 1px solid rgba(255, 255, 255, 0.08); }
        .module-btn { background: rgba(70, 131, 180, 0.1); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .module-btn:hover { transform: scale(1.08); border-color: rgba(255, 255, 255, 0.4); box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); }
        .add-module-btn { background: rgba(16, 185, 129, 0.1); border: 2px dashed rgba(16, 185, 129, 0.4); }
    </style>
</head>
<body class="flex min-h-screen text-slate-200 font-sans">
    <div class="stars-container" id="starField"></div>

    <aside class="w-64 glass-sidebar h-screen sticky top-0 p-6 hidden md:block">
        <div class="mb-10 text-center">
            <h2 class="text-3xl font-black bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500">N-DAMS</h2>
            <p class="text-[9px] text-slate-500 uppercase tracking-[0.4em] font-bold mt-2">Galaxy Hub</p>
        </div>
        <nav class="space-y-3">
            <a href="#" class="flex items-center space-x-3 p-3 bg-blue-600/20 border border-blue-500/30 text-blue-300 rounded-xl"><i class="fa-solid fa-rocket"></i><span>Command Hub</span></a>
            <a href="#" class="flex items-center space-x-3 p-3 text-slate-400 hover:text-white"><i class="fa-solid fa-users"></i><span>Manage Users</span></a>
            <button onclick="logout()" class="flex items-center space-x-3 p-3 text-red-400 hover:bg-red-900/20 w-full rounded-lg mt-10"><i class="fa-solid fa-power-off"></i><span>Logout</span></button>
        </nav>
    </aside>

    <main class="flex-1 p-10">
        <header class="flex justify-between items-center mb-12">
            <div>
                <h1 class="text-4xl font-black text-white tracking-tighter">System Constellations</h1>
                <p class="text-slate-400 mt-2 italic text-lg">Select a module to enter the data subspace.</p>
            </div>
            <button onclick="addNewModule()" class="bg-emerald-500 hover:bg-emerald-400 text-black px-6 py-3 rounded-2xl font-black text-xs uppercase tracking-widest transition-all shadow-lg shadow-emerald-500/20">
                <i class="fa-solid fa-plus-circle mr-2"></i> Add New Module
            </button>
        </header>

        <section>
            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6" id="moduleGrid">
                </div>
        </section>
    </main>

    <script>
        // Star Field Gen
        const starField = document.getElementById('starField');
        for (let i = 0; i < 150; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 2 + 1 + 'px';
            star.style.width = size; star.style.height = size;
            star.style.left = Math.random() * 100 + '%'; star.style.top = Math.random() * 100 + '%';
            star.style.animationDuration = (Math.random() * 50 + 50) + 's';
            starField.appendChild(star);
        }

        // Initial Modules
        let modules = ['FOIS', 'EARTH', 'UTS', 'PRS', 'COIS', 'ICMS', 'CMS', 'RMS'];

        function renderModules() {
            const grid = document.getElementById('moduleGrid');
            grid.innerHTML = '';
            modules.forEach(mod => {
                const btn = document.createElement('button');
                btn.className = `module-btn py-10 px-4 rounded-3xl flex flex-col items-center justify-center space-y-4 group`;
                btn.onclick = () => window.location.href = `module-view.html?mod=${mod}`;
                btn.innerHTML = `
                    <i class="fa-solid fa-satellite text-blue-400 text-3xl group-hover:rotate-45 transition-transform duration-500"></i>
                    <span class="text-sm font-black tracking-widest text-white uppercase">${mod}</span>
                `;
                grid.appendChild(btn);
            });
        }

        function addNewModule() {
            const name = prompt("Enter New Module Name:");
            if (name) {
                modules.push(name.toUpperCase());
                renderModules();
            }
        }

        renderModules();
    </script>
</body>
</html>
