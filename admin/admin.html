<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N-DAMS | Integrated Command</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at center, #1B2735 0%, #090A0F 100%);
            color: #e2e8f0;
            overflow: hidden;
            height: 100vh;
        }
        .stars-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        @keyframes drift { from { transform: translateY(0px); } to { transform: translateY(-2000px); } }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.5; animation: drift linear infinite; }
        .glass-sidebar { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(15px); border-right: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-card { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [currentView, setCurrentView] = useState('hub'); // hub, data, users
            const [assets, setAssets] = useState([
                { id: "BRC-9021", node: "Vadodara Central", data: "OFC-Primary", status: "ACTIVE" },
                { id: "ADI-8842", node: "Ahmedabad Node", data: "Signal-Relay", status: "REVIEW" }
            ]);

            return (
                <div className="flex h-screen overflow-hidden">
                    <StarField />
                    
                    {/* --- SIDEBAR --- */}
                    <aside className="w-64 glass-sidebar p-6 flex flex-col">
                        <div className="mb-10">
                            <h2 className="text-2xl font-black bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500">N-DAMS</h2>
                            <p className="text-[10px] text-slate-500 uppercase tracking-[0.3em] font-bold">Galaxy Command</p>
                        </div>
                        
                        <nav className="space-y-3 flex-1">
                            <SidebarButton 
                                active={currentView === 'hub'} 
                                onClick={() => setCurrentView('hub')}
                                icon="fa-rocket" label="Management Hub" 
                            />
                            <SidebarButton 
                                active={currentView === 'data'} 
                                onClick={() => setCurrentView('data')}
                                icon="fa-database" label="Data Management" 
                            />
                            <SidebarButton 
                                active={currentView === 'users'} 
                                onClick={() => setCurrentView('users')}
                                icon="fa-users" label="Manage Users" 
                            />
                        </nav>

                        <button className="flex items-center space-x-3 p-3 text-red-400 hover:bg-red-900/20 w-full rounded-xl transition-all">
                            <i className="fa-solid fa-power-off"></i>
                            <span className="font-bold text-sm uppercase">Logout</span>
                        </button>
                    </aside>

                    {/* --- MAIN CONTENT SWITCHER --- */}
                    <main className="flex-1 p-8 overflow-y-auto">
                        {currentView === 'hub' && <ManagementHub assets={assets} setAssets={setAssets} />}
                        {currentView === 'data' && <DataManagementView assets={assets} />}
                        {currentView === 'users' && <UserManagementView />}
                    </main>
                </div>
            );
        };

        // --- SUB-VIEWS ---
        const ManagementHub = ({ assets, setAssets }) => {
            const [isModalOpen, setIsModalOpen] = useState(false);
            return (
                <div className="animate-in fade-in duration-500">
                    <header className="flex justify-between items-center mb-10">
                        <h1 className="text-3xl font-bold text-white tracking-tight">Management Hub</h1>
                        <button onClick={() => setIsModalOpen(true)} className="bg-blue-600 hover:bg-blue-500 text-white px-5 py-2.5 rounded-xl text-sm font-bold shadow-lg shadow-blue-900/20">+ New Node</button>
                    </header>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                        <StatCard title="Total Assets" value={assets.length} color="text-blue-400" />
                        <StatCard title="System Health" value="98.2%" color="text-emerald-400" />
                        <StatCard title="Active Alerts" value="3" color="text-amber-400" />
                    </div>
                    {/* Add Table Here if needed */}
                    <div className="glass-card p-6 rounded-2xl text-slate-400 italic">
                        Viewing live operational status of Western Railway nodes...
                    </div>
                </div>
            );
        };

        const DataManagementView = ({ assets }) => (
            <div className="animate-in slide-in-from-bottom-4 duration-500">
                <h1 className="text-3xl font-bold text-white mb-8">Data Repository</h1>
                <div className="glass-card rounded-2xl overflow-hidden">
                    <table className="w-full text-left">
                        <thead className="bg-white/5 text-[10px] uppercase font-black text-slate-500 tracking-widest">
                            <tr><th className="p-5">Node</th><th className="p-5">Link Type</th><th className="p-5">Status</th></tr>
                        </thead>
                        <tbody className="text-sm">
                            {assets.map(a => (
                                <tr key={a.id} className="border-b border-white/5">
                                    <td className="p-5 font-bold">{a.node}</td>
                                    <td className="p-5 text-slate-400">{a.data}</td>
                                    <td className="p-5"><span className="text-emerald-400">{a.status}</span></td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            </div>
        );

        const UserManagementView = () => (
            <div className="animate-in slide-in-from-bottom-4 duration-500">
                <h1 className="text-3xl font-bold text-white mb-8">Access Control</h1>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div className="glass-card p-6 rounded-2xl border-l-4 border-blue-500">
                        <h3 className="font-bold text-white">Administrator</h3>
                        <p className="text-xs text-slate-500 uppercase mt-1">Full System Access</p>
                    </div>
                    <div className="glass-card p-6 rounded-2xl border-l-4 border-purple-500">
                        <h3 className="font-bold text-white">Station Master</h3>
                        <p className="text-xs text-slate-500 uppercase mt-1">Read-Only Asset View</p>
                    </div>
                </div>
            </div>
        );

        // --- COMPONENTS ---
        const SidebarButton = ({ icon, label, active, onClick }) => (
            <button onClick={onClick} className={`flex items-center space-x-3 p-4 w-full rounded-xl transition-all ${active ? 'bg-blue-600/20 border border-blue-500/30 text-blue-400' : 'text-slate-400 hover:text-white hover:bg-white/5'}`}>
                <i className={`fa-solid ${icon}`}></i>
                <span className="text-sm font-bold tracking-tight">{label}</span>
            </button>
        );

        const StatCard = ({ title, value, color }) => (
            <div className="glass-card p-6 rounded-2xl">
                <p className="text-slate-500 text-[10px] font-black uppercase tracking-widest mb-2">{title}</p>
                <h3 className={`text-4xl font-black ${color}`}>{value}</h3>
            </div>
        );

        const StarField = () => {
            useEffect(() => {
                const container = document.getElementById('starField');
                for (let i = 0; i < 150; i++) {
                    const star = document.createElement('div');
                    star.className = 'star';
                    const size = Math.random() * 2 + 1 + 'px';
                    star.style.width = size; star.style.height = size;
                    star.style.left = Math.random() * 100 + '%'; star.style.top = Math.random() * 100 + '%';
                    star.style.animationDuration = (Math.random() * 100 + 50) + 's';
                    star.style.opacity = Math.random();
                    container.appendChild(star);
                }
            }, []);
            return <div className="stars-container" id="starField"></div>;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
