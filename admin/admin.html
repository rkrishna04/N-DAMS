<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N-DAMS | Galaxy Command Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at center, #1B2735 0%, #090A0F 100%);
            color: #e2e8f0;
            overflow-x: hidden;
            margin: 0;
        }

        .stars-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
        }

        @keyframes drift {
            from { transform: translateY(0px); }
            to { transform: translateY(-2000px); }
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: drift linear infinite;
        }

        .glass-sidebar {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(15px);
            border-right: 1px solid rgba(255, 255, 255, 0.08);
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* VIBRANT GLASS BUTTONS */
        .module-btn {
            background: rgba(70, 131, 180, 0.15);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .module-btn:hover {
            transform: translateY(-5px) scale(1.05);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .glow-blue:hover { box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); }
        .glow-purple:hover { box-shadow: 0 0 20px rgba(168, 85, 247, 0.4); }
        .glow-emerald:hover { box-shadow: 0 0 20px rgba(16, 185, 129, 0.4); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [view, setView] = useState('hub'); // hub, data, users
            const [assets, setAssets] = useState([
                { id: "BRC-9021", node: "Vadodara Central", data: "OFC-Primary", status: "ACTIVE" },
                { id: "ADI-8842", node: "Ahmedabad Node", data: "Signal-Relay", status: "REVIEW" },
                { id: "ST-7731", node: "Surat Junction", data: "Power-Grid", status: "ACTIVE" }
            ]);

            const stats = {
                pending: assets.filter(a => a.status === 'REVIEW').length,
                total: 52 + assets.length,
                active: assets.filter(a => a.status === 'ACTIVE').length,
                links: 24 + (assets.length * 2)
            };

            return (
                <div className="flex min-h-screen">
                    <StarField />
                    
                    {/* --- SIDEBAR --- */}
                    <aside className="w-64 glass-sidebar h-screen sticky top-0 p-6 hidden md:flex flex-col">
                        <div className="mb-10">
                            <h2 className="text-2xl font-black bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500">N-DAMS</h2>
                            <p className="text-[10px] text-slate-500 uppercase tracking-[0.3em] font-bold">Administrative Access</p>
                        </div>
                        
                        <nav className="space-y-3 flex-1">
                            <NavItem active={view === 'hub'} onClick={() => setView('hub')} icon="fa-rocket" label="Management Hub" />
                            <NavItem active={view === 'data'} onClick={() => setView('data')} icon="fa-database" label="Data Management" />
                            <NavItem active={view === 'users'} onClick={() => setView('users')} icon="fa-users" label="Manage Users" />
                        </nav>

                        <button className="flex items-center space-x-3 p-3 text-red-400 hover:bg-red-900/20 w-full rounded-xl transition-all font-bold text-xs uppercase tracking-widest">
                            <i className="fa-solid fa-power-off"></i>
                            <span>Logout System</span>
                        </button>
                    </aside>

                    {/* --- MAIN CONTENT AREA --- */}
                    <main className="flex-1 p-8">
                        <header className="flex justify-between items-center mb-10">
                            <div>
                                <h1 className="text-3xl font-black text-white tracking-tight">
                                    {view === 'hub' && "Galaxy Command"}
                                    {view === 'data' && "Data Repository"}
                                    {view === 'users' && "Access Control"}
                                </h1>
                                <p className="text-slate-400 text-sm mt-1">Western Railway Operational Intelligence</p>
                            </div>
                            <div className="w-12 h-12 rounded-2xl bg-gradient-to-br from-blue-600 to-indigo-700 flex items-center justify-center text-white font-black border border-white/20 shadow-2xl">
                                AD
                            </div>
                        </header>

                        {view === 'hub' && <HubView stats={stats} />}
                        {view === 'data' && <DataView assets={assets} setAssets={setAssets} />}
                        {view === 'users' && <UserView />}
                    </main>
                </div>
            );
        };

        // --- SUB-VIEWS ---

        const HubView = ({ stats }) => {
            const modules = ['FOIS', 'EARTH', 'FC', 'TCS', 'UTS', 'PRS', 'COIS', 'ICMS'];
            return (
                <div className="animate-in fade-in slide-in-from-bottom-4 duration-700">
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-6 mb-12">
                        <StatCard title="Pending" value={stats.pending} color="text-amber-400" />
                        <StatCard title="Total Assets" value={stats.total} color="text-white" />
                        <StatCard title="Nodes Active" value={stats.active} color="text-emerald-400" />
                        <StatCard title="Grid Links" value={stats.links} color="text-blue-400" />
                    </div>

                    <div className="flex items-center space-x-4 mb-8">
                        <div className="h-px w-full bg-gradient-to-r from-blue-500/50 to-transparent"></div>
                        <h2 className="text-[10px] font-black uppercase tracking-[0.4em] text-blue-400 whitespace-nowrap">Tactical Modules</h2>
                        <div className="h-px w-full bg-gradient-to-r from-blue-500/50 to-transparent"></div>
                    </div>

                    <div className="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-8 gap-4">
                        {modules.map(mod => (
                            <button key={mod} className="module-btn glow-blue p-6 rounded-2xl flex flex-col items-center justify-center space-y-2 group">
                                <i className="fa-solid fa-atom text-blue-400 text-xl group-hover:rotate-180 transition-transform duration-700"></i>
                                <span className="text-[10px] font-black text-white uppercase">{mod}</span>
                            </button>
                        ))}
                    </div>
                </div>
            );
        };

        const DataView = ({ assets, setAssets }) => {
            const deleteEntry = (id) => {
                if(confirm("Confirm asset decommissioning?")) {
                    setAssets(assets.filter(a => a.id !== id));
                }
            };

            return (
                <div className="animate-in fade-in duration-500">
                    <div className="glass-card rounded-3xl overflow-hidden border border-white/10">
                        <table className="w-full text-left border-collapse">
                            <thead>
                                <tr className="bg-white/5 text-[10px] uppercase font-black text-slate-500 tracking-widest">
                                    <th className="p-5">ID</th>
                                    <th className="p-5">Node</th>
                                    <th className="p-5">Stream</th>
                                    <th className="p-5">Status</th>
                                    <th className="p-5 text-right">Action</th>
                                </tr>
                            </thead>
                            <tbody className="text-sm divide-y divide-white/5">
                                {assets.map(a => (
                                    <tr key={a.id} className="hover:bg-white/5 transition-colors">
                                        <td className="p-5 font-mono text-blue-400 font-bold">{a.id}</td>
                                        <td className="p-5 font-bold text-white">{a.node}</td>
                                        <td className="p-5 text-slate-400">{a.data}</td>
                                        <td className="p-5">
                                            <span className={`px-2 py-1 rounded text-[10px] font-black ${a.status === 'ACTIVE' ? 'bg-emerald-500/20 text-emerald-400' : 'bg-amber-500/20 text-amber-400'}`}>
                                                {a.status}
                                            </span>
                                        </td>
                                        <td className="p-5 text-right">
                                            <button onClick={() => deleteEntry(a.id)} className="text-red-400 hover:text-red-300 text-xs font-black uppercase tracking-tighter">Terminate</button>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const UserView = () => (
            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 animate-in slide-in-from-bottom-4">
                <div className="glass-card p-8 rounded-3xl border-l-4 border-purple-500">
                    <h3 className="text-xl font-bold text-white mb-2">System Administrator</h3>
                    <p className="text-slate-400 text-sm">Full read/write access to core N-DAMS database and node deployment.</p>
                </div>
                <div className="glass-card p-8 rounded-3xl border-l-4 border-blue-500">
                    <h3 className="text-xl font-bold text-white mb-2">Station Monitor</h3>
                    <p className="text-slate-400 text-sm">Restricted to telemetry observation and report generation for specific zones.</p>
                </div>
            </div>
        );

        // --- COMPONENTS ---

        const NavItem = ({ icon, label, active, onClick }) => (
            <button onClick={onClick} className={`flex items-center space-x-3 p-4 w-full rounded-xl transition-all border ${active ? 'bg-blue-600/20 border-blue-500/40 text-blue-300 shadow-lg shadow-blue-900/20' : 'border-transparent text-slate-500 hover:text-white hover:bg-white/5'}`}>
                <i className={`fa-solid ${icon}`}></i>
                <span className="text-sm font-bold">{label}</span>
            </button>
        );

        const StatCard = ({ title, value, color }) => (
            <div className="glass-card p-6 rounded-2xl border border-white/5">
                <p className="text-slate-500 text-[10px] font-black uppercase tracking-widest mb-1">{title}</p>
                <h3 className={`text-4xl font-black ${color}`}>{value}</h3>
            </div>
        );

        const StarField = () => {
            useEffect(() => {
                const container = document.getElementById('starField');
                for (let i = 0; i < 150; i++) {
                    const star = document.createElement('div');
                    star.className = 'star';
                    const size = Math.random() * 2 + 1 + 'px';
                    star.style.width = size; star.style.height = size;
                    star.style.left = Math.random() * 100 + '%'; star.style.top = Math.random() * 100 + '%';
                    star.style.animationDuration = (Math.random() * 100 + 50) + 's';
                    star.style.opacity = Math.random();
                    container.appendChild(star);
                }
            }, []);
            return <div className="stars-container" id="starField"></div>;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
