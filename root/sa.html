<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Root Management | Create Super Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <style>body { font-family: 'Manrope', sans-serif; }</style>
</head>
<body class="bg-[#1a1e23] text-[#e9f0f1]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const RootManagementApp = () => {
            // --- STATE: List of Admins (Reflects instantly in UI) ---
            const [superAdmins, setSuperAdmins] = useState([
                { id: 1, name: 'Initial System Admin', email: 'sys.admin@railway.gov.in', status: 'Active' }
            ]);

            // --- STATE: Form Inputs ---
            const [formData, setFormData] = useState({ fullName: '', email: '', tempPass: '' });
            const [isProcessing, setIsProcessing] = useState(false);
            const [showSuccess, setShowSuccess] = useState(false);

            // --- WORKFLOW: CREATE SUPER ADMIN ---
            const handleCreateAdmin = (e) => {
                e.preventDefault();
                setIsProcessing(true);

                // Simulation: Logic Layer processes details (Workflow Step 1)
                setTimeout(() => {
                    const newAdmin = {
                        id: Date.now(),
                        name: formData.fullName,
                        email: formData.email,
                        status: 'Pending Setup'
                    };

                    // 1. Reflect change in the management table instantly
                    setSuperAdmins([...superAdmins, newAdmin]);

                    // 2. Simulate System sending Welcome Email (Workflow Step 2)
                    console.log(`SYSTEM: Welcome Email sent to ${formData.email} with temp password: ${formData.tempPass}`);
                    
                    setIsProcessing(false);
                    setShowSuccess(true);
                    setFormData({ fullName: '', email: '', tempPass: '' }); // Clear form

                    // Hide success message after 3 seconds
                    setTimeout(() => setShowSuccess(false), 3000);
                }, 1200);
            };

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* Sidebar */}
                    <aside className="w-64 border-r border-[#2b313a] p-6 bg-[#1a1e23] flex flex-col">
                        <div className="flex items-center gap-3 mb-10 text-[#1a535b]">
                            <span className="material-symbols-outlined text-3xl">admin_panel_settings</span>
                            <span className="font-bold text-xl text-white">Root Panel</span>
                        </div>
                        <nav className="space-y-2">
                            <div className="bg-[#1a535b]/10 text-[#e9f0f1] p-3 rounded-lg border-l-4 border-[#1a535b] flex items-center gap-2">
                                <span className="material-symbols-outlined text-sm">person_add</span>
                                <span className="text-sm font-bold">Manage Super Admins</span>
                            </div>
                            <div className="text-[#5a868c] p-3 hover:text-white transition-colors cursor-pointer flex items-center gap-2">
                                <span className="material-symbols-outlined text-sm">history</span>
                                <span className="text-sm">Modification Logs</span>
                            </div>
                        </nav>
                    </aside>

                    {/* Main Workspace */}
                    <main className="flex-1 flex flex-col p-8 overflow-y-auto">
                        <div className="max-w-4xl mx-auto w-full space-y-8">
                            
                            {/* Header Section */}
                            <div>
                                <h1 className="text-2xl font-extrabold">Step 1: Create Super Admin</h1>
                                <p className="text-[#5a868c] text-sm mt-1">Initialize high-level administrative accounts for system oversight.</p>
                            </div>

                            {/* Creation Form */}
                            <section className="bg-[#24292f] border border-[#3a414b] rounded-xl p-8 shadow-2xl relative overflow-hidden">
                                {showSuccess && (
                                    <div className="absolute top-0 left-0 w-full bg-[#078834] text-white text-center py-2 text-xs font-bold animate-bounce">
                                        Welcome Email Sent Successfully!
                                    </div>
                                )}

                                <form onSubmit={handleCreateAdmin} className="grid grid-cols-2 gap-6">
                                    <div className="space-y-2">
                                        <label className="text-[10px] uppercase font-bold text-[#5a868c]">Full Name</label>
                                        <input 
                                            required
                                            type="text" 
                                            className="w-full bg-[#1a1e23] border border-[#3a414b] p-3 rounded-lg focus:border-[#1a535b] outline-none transition-all text-sm"
                                            placeholder="e.g. Rajesh Kumar"
                                            value={formData.fullName}
                                            onChange={(e) => setFormData({...formData, fullName: e.target.value})}
                                        />
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-[10px] uppercase font-bold text-[#5a868c]">Email Address</label>
                                        <input 
                                            required
                                            type="email" 
                                            className="w-full bg-[#1a1e23] border border-[#3a414b] p-3 rounded-lg focus:border-[#1a535b] outline-none transition-all text-sm"
                                            placeholder="admin@westernrailway.com"
                                            value={formData.email}
                                            onChange={(e) => setFormData({...formData, email: e.target.value})}
                                        />
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-[10px] uppercase font-bold text-[#5a868c]">Temporary Password</label>
                                        <input 
                                            required
                                            type="text" 
                                            className="w-full bg-[#1a1e23] border border-[#3a414b] p-3 rounded-lg focus:border-[#1a535b] outline-none transition-all text-sm font-mono"
                                            placeholder="SAdmin_2026_#"
                                            value={formData.tempPass}
                                            onChange={(e) => setFormData({...formData, tempPass: e.target.value})}
                                        />
                                    </div>
                                    <div className="flex items-end">
                                        <button 
                                            type="submit" 
                                            disabled={isProcessing}
                                            className="w-full bg-[#1a535b] hover:bg-[#1a535b]/80 py-3.5 rounded-lg text-xs font-bold uppercase tracking-widest transition-all disabled:opacity-50"
                                        >
                                            {isProcessing ? 'Processing System Workflow...' : 'Create & Send Welcome Email'}
                                        </button>
                                    </div>
                                </form>
                            </section>

                            {/* Dynamic Reflection Table */}
                            <section>
                                <h2 className="text-sm font-bold text-[#5a868c] uppercase mb-4 tracking-tighter">Current Super Admin Inventory</h2>
                                <div className="bg-[#24292f] border border-[#3a414b] rounded-xl overflow-hidden">
                                    <table className="w-full text-left text-sm">
                                        <thead className="bg-[#1a1e23]/50 text-[#5a868c] text-[10px] uppercase font-bold">
                                            <tr>
                                                <th className="px-6 py-4">Full Name</th>
                                                <th className="px-6 py-4">Email</th>
                                                <th className="px-6 py-4">Status</th>
                                                <th className="px-6 py-4 text-right">Action</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-[#3a414b]">
                                            {superAdmins.map(admin => (
                                                <tr key={admin.id} className="hover:bg-[#3a414b]/20 transition-colors">
                                                    <td className="px-6 py-4 font-bold">{admin.name}</td>
                                                    <td className="px-6 py-4 text-[#5a868c] font-mono text-xs">{admin.email}</td>
                                                    <td className="px-6 py-4">
                                                        <span className={`px-2 py-0.5 rounded-full text-[10px] font-bold uppercase ${admin.status === 'Active' ? 'bg-[#078834]/10 text-[#078834]' : 'bg-[#C8AA6E]/10 text-[#C8AA6E]'}`}>
                                                            {admin.status}
                                                        </span>
                                                    </td>
                                                    <td className="px-6 py-4 text-right">
                                                        <button className="text-[#D85B42] text-[10px] font-bold uppercase hover:underline">Revoke Access</button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </section>

                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<RootManagementApp />);
    </script>
</body>
</html>
