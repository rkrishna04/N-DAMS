<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Root Security Dashboard | NOCC ROOT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <style>
        body { font-family: 'Manrope', sans-serif; }
    </style>
</head>
<body class="bg-[#1a1e23] text-[#e9f0f1]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const RootDashboard = () => {
            // --- DATA STATE (Reflects instantly in UI) ---
            const [backups, setBackups] = useState([
                { id: 'sha256:7f8d...a21b', timestamp: '2026-03-07 04:00:01', status: 'Success', size: '42.8 GB' },
                { id: 'sha256:3a1c...eef9', timestamp: '2026-03-06 04:00:01', status: 'Success', size: '42.7 GB' }
            ]);

            const [saAccounts, setSaAccounts] = useState([
                { id: 1, name: 'j.dawson_admin', initial: 'JD', active: true },
                { id: 2, name: 'm.knight_root', initial: 'MK', active: true }
            ]);

            // --- WORKFLOW: MANUAL BACKUP ---
            const runBackup = () => {
                const newLog = {
                    id: `sha256:${Math.random().toString(16).slice(2, 10)}`,
                    timestamp: new Date().toLocaleString(),
                    status: 'Success',
                    size: '43.1 GB'
                };
                setBackups([newLog, ...backups]); // UI updates immediately
            };

            // --- WORKFLOW: REVOKE ACCESS ---
            const toggleAccess = (id) => {
                setSaAccounts(saAccounts.map(acc => 
                    acc.id === id ? { ...acc, active: !acc.active } : acc
                ));
            };

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* Sidebar */}
                    <aside className="w-64 border-r border-[#2b313a] flex flex-col p-6 bg-[#1a1e23]">
                        <div className="flex items-center gap-3 mb-10">
                            <div className="p-2 bg-[#1a535b] rounded-lg">
                                <span className="material-symbols-outlined">terminal</span>
                            </div>
                            <span className="font-bold text-lg">System Root</span>
                        </div>
                        <nav className="space-y-4">
                            <div className="text-[#1a535b] font-bold text-sm bg-[#1a535b]/10 p-2 rounded border-l-4 border-[#1a535b]">Overview</div>
                            <div className="text-[#5a868c] text-sm p-2 cursor-pointer hover:text-white">System Backup</div>
                            <div className="text-[#5a868c] text-sm p-2 cursor-pointer hover:text-white">Identity Management</div>
                        </nav>
                        <button className="mt-auto bg-[#D85B42] py-3 rounded-lg text-xs font-bold uppercase">Emergency Lock</button>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 flex flex-col bg-[#1a1e23]">
                        <header className="h-16 border-b border-[#2b313a] flex items-center justify-between px-8">
                            <div className="text-xs font-mono text-[#5a868c]">path: root / security / dashboard</div>
                            <div className="flex items-center gap-4">
                                <span className="text-xs text-[#078834] font-bold">● SYSTEM PULSE: NOMINAL</span>
                                <div className="text-right">
                                    <p className="text-sm font-bold">Krishnakumar_Root</p>
                                    <p className="text-[10px] text-[#1a535b] font-bold uppercase">Superuser</p>
                                </div>
                            </div>
                        </header>

                        <div className="p-8 overflow-y-auto space-y-8">
                            {/* Backup Section */}
                            <section className="bg-[#24292f] border border-[#3a414b] rounded-xl p-6">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-xl font-bold">Backup Scheduler</h2>
                                    <button onClick={runBackup} className="bg-[#1a535b] px-4 py-2 rounded-lg text-xs font-bold hover:opacity-90">RUN MANUAL BACKUP</button>
                                </div>
                                <table className="w-full text-left text-sm">
                                    <thead className="bg-[#1a1e23] text-[#5a868c] text-[10px] uppercase">
                                        <tr>
                                            <th className="p-4">Timestamp</th>
                                            <th className="p-4">Checksum</th>
                                            <th className="p-4">Status</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {backups.map((b, i) => (
                                            <tr key={i} className="border-t border-[#3a414b]">
                                                <td className="p-4">{b.timestamp}</td>
                                                <td className="p-4 font-mono text-xs">{b.id}</td>
                                                <td className="p-4 text-[#078834] font-bold">{b.status}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </section>

                            {/* Account Management */}
                            <section className="bg-[#24292f] border border-[#3a414b] rounded-xl p-6 w-96">
                                <h2 className="text-lg font-bold mb-4">SA Accounts</h2>
                                <div className="space-y-4">
                                    {saAccounts.map(acc => (
                                        <div key={acc.id} className="flex justify-between items-center bg-[#2b313a] p-3 rounded-lg border border-[#3a414b]">
                                            <div className={`flex items-center gap-3 ${!acc.active && 'opacity-30'}`}>
                                                <div className="bg-[#1a535b] p-2 rounded-full text-xs font-bold">{acc.initial}</div>
                                                <span className={`text-xs ${!acc.active && 'line-through'}`}>{acc.name}</span>
                                            </div>
                                            <button onClick={() => toggleAccess(acc.id)} className="text-[10px] font-bold text-[#D85B42] uppercase">
                                                {acc.active ? 'Revoke' : 'Restore'}
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            </section>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<RootDashboard />);
    </script>
</body>
</html>
