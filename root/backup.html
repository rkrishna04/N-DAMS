<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>System Backup | System Root</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1a535b",
                        "background-light": "#fcfdfc",
                        "background-dark": "#1a1e23",
                        "surface-dark": "#24292f",
                        "accent-gold": "#C8AA6E",
                        "accent-red": "#D85B42",
                        "accent-green": "#078834"
                    },
                    fontFamily: { "display": ["Manrope", "sans-serif"] }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        body { font-family: 'Manrope', sans-serif; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #1a1e23; }
        ::-webkit-scrollbar-thumb { background: #1a535b; border-radius: 10px; }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-[#101819] dark:text-[#e9f0f1] font-display selection:bg-primary/30">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const BackupApp = () => {
            const [logs, setLogs] = useState([
                { id: 1, timestamp: '2026-03-07 04:00:01', checksum: 'sha256:7f8d...a21b', status: 'Success', size: '42.8 GB' },
                { id: 2, timestamp: '2026-03-06 04:00:01', checksum: 'sha256:3a1c...eef9', status: 'Success', size: '42.7 GB' }
            ]);
            const [isBackingUp, setIsBackingUp] = useState(false);

            // --- CORE FUNCTION: DOWNLOAD ALL DATA LOCALLY ---
            const triggerLocalDownload = () => {
                setIsBackingUp(true);

                // 1. Simulate Data Gathering from your MERN/FastAPI backend
                const systemData = {
                    metadata: {
                        version: "4.2.0-stable",
                        exported_at: new Date().toISOString(),
                        origin: "System Root NOCC"
                    },
                    content: {
                        users: [
                            { id: "root_01", role: "Root", last_login: "2026-03-07" },
                            { id: "sa_05", role: "Super Admin", status: "Active" }
                        ],
                        system_stats: { health: "99%", uptime: "342 days" },
                        logs: logs
                    }
                };

                // 2. Create the physical file (Blob)
                setTimeout(() => {
                    const dataStr = JSON.stringify(systemData, null, 4);
                    const dataBlob = new Blob([dataStr], { type: 'application/json' });
                    const url = window.URL.createObjectURL(dataBlob);
                    
                    // 3. Trigger Browser Download
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = `ROOT_BACKUP_${new Date().getTime()}.json`;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);

                    // 4. Update UI Logs
                    const newEntry = {
                        id: Date.now(),
                        timestamp: new Date().toLocaleString(),
                        checksum: 'sha256:' + Math.random().toString(16).slice(2, 10) + '...',
                        status: 'Success',
                        size: (Math.random() * (45 - 40) + 40).toFixed(1) + ' GB'
                    };
                    setLogs([newEntry, ...logs]);
                    setIsBackingUp(false);
                }, 2000); // 2-second simulation delay
            };

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* --- SIDEBAR --- */}
                    <aside className="w-64 flex-shrink-0 border-r border-[#d3e1e3] dark:border-[#2b313a] flex flex-col bg-background-light dark:bg-background-dark">
                        <div className="p-6">
                            <div className="flex items-center gap-3 mb-8">
                                <div className="size-8 bg-primary rounded-lg flex items-center justify-center text-white">
                                    <span className="material-symbols-outlined">terminal</span>
                                </div>
                                <div>
                                    <h1 className="text-lg font-bold leading-tight">System Root</h1>
                                    <p className="text-xs text-[#5a868c]">v4.2.0-stable</p>
                                </div>
                            </div>
                            <nav className="space-y-1">
                                <a href="root.html" className="flex items-center gap-3 px-3 py-2.5 rounded-lg text-[#5a868c] hover:bg-[#e9f0f1] dark:hover:bg-[#2b313a]">
                                    <span className="material-symbols-outlined text-sm">dashboard</span>
                                    <span className="text-sm">Overview</span>
                                </a>
                                <a href="backup.html" className="flex items-center gap-3 px-3 py-2.5 rounded-lg bg-primary/10 text-primary dark:text-[#e9f0f1] font-semibold border-l-4 border-primary">
                                    <span className="material-symbols-outlined text-sm">database</span>
                                    <span className="text-sm">System Backup</span>
                                </a>
                                <a href="sa.html" className="flex items-center gap-3 px-3 py-2.5 rounded-lg text-[#5a868c] hover:bg-[#e9f0f1] dark:hover:bg-[#2b313a]">
                                    <span className="material-symbols-outlined text-sm">shield_person</span>
                                    <span className="text-sm">SA Management</span>
                                </a>
                            </nav>
                        </div>
                        <div className="mt-auto p-4 border-t border-[#d3e1e3] dark:border-[#2b313a]">
                            <button className="w-full flex items-center justify-center gap-2 py-3 bg-accent-red text-white font-bold rounded-lg uppercase tracking-widest text-xs">
                                <span className="material-symbols-outlined text-sm">lock_reset</span>
                                Emergency Lock
                            </button>
                        </div>
                    </aside>

                    {/* --- MAIN CONTENT --- */}
                    <main className="flex-1 flex flex-col overflow-hidden bg-[#f9fbfb] dark:bg-background-dark">
                        <header className="h-16 border-b border-[#d3e1e3] dark:border-[#2b313a] flex items-center justify-between px-8 bg-background-light dark:bg-background-dark z-10">
                            <div className="flex items-center gap-4">
                                <span className="text-sm font-medium text-[#5a868c]">Path:</span>
                                <div className="text-xs font-mono bg-[#e9f0f1] dark:bg-[#2b313a] px-3 py-1 rounded border border-[#d3e1e3] dark:border-[#3a414b]">
                                    root <span class="mx-2 opacity-50">/</span> system <span class="mx-2 opacity-50">/</span> backup
                                </div>
                            </div>
                        </header>

                        <div className="flex-1 overflow-y-auto p-8 space-y-8">
                            {/* Backup Control Card */}
                            <div className="grid grid-cols-12 gap-8">
                                <div className="col-span-12">
                                    <section className="bg-background-light dark:bg-surface-dark rounded-xl border border-[#d3e1e3] dark:border-[#3a414b] overflow-hidden">
                                        <div className="px-6 py-6 border-b border-[#d3e1e3] dark:border-[#3a414b] flex justify-between items-center bg-[#fcfdfc] dark:bg-[#2b313a]/50">
                                            <div>
                                                <h2 className="text-xl font-bold flex items-center gap-3">
                                                    <span className="material-symbols-outlined text-primary scale-125">cloud_download</span>
                                                    Data Extraction Engine
                                                </h2>
                                                <p className="text-xs text-[#5a868c] mt-1">Generate a full encrypted snapshot of the system database for local storage.</p>
                                            </div>
                                            <button 
                                                onClick={triggerLocalDownload}
                                                disabled={isBackingUp}
                                                className="px-6 py-3 bg-primary text-white text-sm font-bold rounded-lg hover:bg-primary/90 transition-all uppercase tracking-widest shadow-lg shadow-primary/20 disabled:opacity-50"
                                            >
                                                {isBackingUp ? 'Processing Blob...' : 'Run Manual Backup'}
                                            </button>
                                        </div>
                                        <div className="p-8 grid grid-cols-3 gap-6">
                                            <div className="p-4 rounded-lg bg-[#e9f0f1] dark:bg-background-dark border border-[#d3e1e3] dark:border-[#3a414b]">
                                                <p className="text-[10px] uppercase font-bold text-[#5a868c] mb-2">Export Format</p>
                                                <div className="flex items-center gap-2">
                                                    <span className="material-symbols-outlined text-primary">data_object</span>
                                                    <span className="text-sm font-mono font-bold">JSON (Encrypted)</span>
                                                </div>
                                            </div>
                                            <div className="p-4 rounded-lg bg-[#e9f0f1] dark:bg-background-dark border border-[#d3e1e3] dark:border-[#3a414b]">
                                                <p className="text-[10px] uppercase font-bold text-[#5a868c] mb-2">Compression</p>
                                                <div className="flex items-center gap-2">
                                                    <span className="material-symbols-outlined text-accent-green">inventory_2</span>
                                                    <span className="text-sm font-bold">Gzip Level 9</span>
                                                </div>
                                            </div>
                                            <div className="p-4 rounded-lg bg-[#e9f0f1] dark:bg-background-dark border border-[#d3e1e3] dark:border-[#3a414b]">
                                                <p className="text-[10px] uppercase font-bold text-[#5a868c] mb-2">Local Write Status</p>
                                                <div className="flex items-center gap-2">
                                                    <span className="material-symbols-outlined text-accent-gold">check_circle</span>
                                                    <span className="text-sm font-bold">Ready for Download</span>
                                                </div>
                                            </div>
                                        </div>
                                    </section>
                                </div>

                                {/* Logs Table */}
                                <div className="col-span-12">
                                    <section className="bg-background-light dark:bg-surface-dark rounded-xl border border-[#d3e1e3] dark:border-[#3a414b] overflow-hidden">
                                        <div className="px-6 py-4 border-b border-[#d3e1e3] dark:border-[#3a414b]">
                                            <h2 className="text-sm font-bold uppercase tracking-widest text-[#5a868c]">Backup Audit Trail</h2>
                                        </div>
                                        <table className="w-full text-left">
                                            <thead className="bg-[#e9f0f1]/30 dark:bg-[#1a1e23]/30 text-[#5a868c] text-[10px] uppercase font-bold">
                                                <tr>
                                                    <th className="px-6 py-4">Timestamp</th>
                                                    <th className="px-6 py-4">Checksum</th>
                                                    <th className="px-6 py-4">Status</th>
                                                    <th className="px-6 py-4">Size</th>
                                                    <th className="px-6 py-4 text-right">Action</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-[#d3e1e3] dark:divide-[#3a414b] text-sm">
                                                {logs.map(log => (
                                                    <tr key={log.id} className="hover:bg-primary/5 transition-colors">
                                                        <td className="px-6 py-4 font-mono text-xs">{log.timestamp}</td>
                                                        <td className="px-6 py-4 font-mono text-[10px] opacity-60">{log.checksum}</td>
                                                        <td className="px-6 py-4">
                                                            <span className="flex items-center gap-2 text-accent-green font-bold">
                                                                <span className="size-1.5 rounded-full bg-accent-green"></span>
                                                                {log.status}
                                                            </span>
                                                        </td>
                                                        <td className="px-6 py-4 font-bold">{log.size}</td>
                                                        <td className="px-6 py-4 text-right">
                                                            <button className="text-primary font-bold hover:underline">Re-Download</button>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </section>
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BackupApp />);
    </script>
</body>
</html>
