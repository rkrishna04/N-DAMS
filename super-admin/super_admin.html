<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/><meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>User Management | NOCC SA Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
</head>
<body class="bg-[#0b0e11] text-gray-200 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const UserManagement = () => {
            const [userType, setUserType] = useState('NORMAL'); // 'NORMAL' or 'ADMIN'
            const [users, setUsers] = useState([]);
            const [formData, setFormData] = useState({
                name: '', email: '', phone: '', dept: '', post: '', password: ''
            });

            const handleCreate = (e) => {
                e.preventDefault();
                const permissions = userType === 'ADMIN' 
                    ? "View, Modify, Generate Reports" 
                    : "View Data Only";
                
                const newUser = { ...formData, type: userType, permissions, id: Date.now() };
                setUsers([newUser, ...users]);
                
                // Reset form
                setFormData({ name: '', email: '', phone: '', dept: '', post: '', password: '' });
                alert(`${userType} Created Successfully with ${permissions} permissions.`);
            };

            return (
                <div className="flex h-screen">
                    {/* Sidebar */}
                    <aside className="w-64 border-r border-white/5 p-6 bg-[#0f1216]">
                        <div className="text-amber-500 font-black text-xl mb-10">NOCC SA</div>
                        <nav className="space-y-2">
                            <a href="sa.html" className="block p-3 text-gray-400 hover:text-white">Zonal Dashboard</a>
                            <div className="p-3 bg-amber-500/10 text-amber-500 rounded-lg font-bold border-l-4 border-amber-500">User Management</div>
                            <a href="root.html" className="block p-3 text-gray-400 hover:text-white">System Root</a>
                        </nav>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 p-10 overflow-y-auto">
                        <h1 className="text-3xl font-black mb-8">Provisioning Portal</h1>

                        <div className="grid grid-cols-12 gap-10">
                            {/* Creation Form */}
                            <section className="col-span-5 bg-[#161a1f] p-8 rounded-2xl border border-white/5">
                                <h2 className="text-lg font-bold mb-6 text-amber-500">Create New Account</h2>
                                
                                <div className="flex gap-4 mb-8">
                                    <button 
                                        onClick={() => setUserType('NORMAL')}
                                        className={`flex-1 py-2 rounded-lg text-xs font-bold transition-all ${userType === 'NORMAL' ? 'bg-amber-500 text-black' : 'bg-white/5 text-gray-500'}`}>
                                        NORMAL USER
                                    </button>
                                    <button 
                                        onClick={() => setUserType('ADMIN')}
                                        className={`flex-1 py-2 rounded-lg text-xs font-bold transition-all ${userType === 'ADMIN' ? 'bg-blue-500 text-white' : 'bg-white/5 text-gray-500'}`}>
                                        ADMIN
                                    </button>
                                </div>

                                <form onSubmit={handleCreate} className="space-y-4">
                                    <input required placeholder="Full Name" className="w-full bg-black/40 border border-white/10 p-3 rounded-lg text-sm" 
                                        value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} />
                                    
                                    <div className="grid grid-cols-2 gap-4">
                                        <input required type="email" placeholder="Email Address" className="bg-black/40 border border-white/10 p-3 rounded-lg text-sm" 
                                            value={formData.email} onChange={e => setFormData({...formData, email: e.target.value})} />
                                        <input required type="tel" placeholder="Phone Number" className="bg-black/40 border border-white/10 p-3 rounded-lg text-sm" 
                                            value={formData.phone} onChange={e => setFormData({...formData, phone: e.target.value})} />
                                    </div>

                                    <div className="grid grid-cols-2 gap-4">
                                        <select className="bg-black/40 border border-white/10 p-3 rounded-lg text-sm" 
                                            value={formData.dept} onChange={e => setFormData({...formData, dept: e.target.value})}>
                                            <option>Department</option>
                                            <option>Signal & Telecom</option>
                                            <option>Operations</option>
                                            <option>Civil Engineering</option>
                                        </select>
                                        
                                        {userType === 'NORMAL' && (
                                            <input placeholder="Post / Rank" className="bg-black/40 border border-white/10 p-3 rounded-lg text-sm" 
                                                value={formData.post} onChange={e => setFormData({...formData, post: e.target.value})} />
                                        )}
                                    </div>

                                    <input required type="password" placeholder="Temporary Password" className="w-full bg-black/40 border border-white/10 p-3 rounded-lg text-sm" 
                                        value={formData.password} onChange={e => setFormData({...formData, password: e.target.value})} />

                                    <div className="p-4 bg-white/5 rounded-lg border border-dashed border-white/10">
                                        <p className="text-[10px] uppercase font-bold text-gray-500 mb-1">System Assigned Permissions</p>
                                        <p className="text-xs font-mono text-amber-500">
                                            {userType === 'ADMIN' ? "✅ View, ✅ Modify, ✅ Generate Reports" : "✅ View Data Only"}
                                        </p>
                                    </div>

                                    <button className="w-full py-4 bg-amber-600 hover:bg-amber-500 text-black font-black rounded-xl transition-all shadow-lg shadow-amber-900/20">
                                        CONFIRM & CREATE {userType}
                                    </button>
                                </form>
                            </section>

                            {/* User List / Audit Log */}
                            <section className="col-span-7 space-y-4">
                                <h2 className="text-lg font-bold mb-4 flex items-center gap-2">
                                    <span className="material-symbols-outlined text-amber-500">group</span>
                                    Active Directory
                                </h2>
                                <div className="space-y-3">
                                    {users.map(user => (
                                        <div key={user.id} className="p-4 bg-[#161a1f] border border-white/5 rounded-xl flex justify-between items-center">
                                            <div>
                                                <p className="font-bold text-sm">{user.name} <span className="text-[10px] ml-2 text-gray-500 uppercase">{user.dept}</span></p>
                                                <p className="text-xs text-amber-500/80 font-mono">{user.permissions}</p>
                                            </div>
                                            <div className={`px-3 py-1 rounded text-[9px] font-black uppercase ${user.type === 'ADMIN' ? 'bg-blue-500 text-white' : 'bg-gray-700 text-gray-300'}`}>
                                                {user.type}
                                            </div>
                                        </div>
                                    ))}
                                    {users.length === 0 && <p className="text-gray-600 text-sm italic">No users created in this session.</p>}
                                </div>
                            </section>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<UserManagement />);
    </script>
</body>
</html>
